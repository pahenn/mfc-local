                      <option value="variance">Variance only</option>
                      <option value="matched">Matched only</option>
                      <option value="missing_mfc">Missing from MFC</option>
                      <option value="missing_driven">Missing from Driven</option>
                    </select>
                  </div>
                  <div>
                    <label>Sort by</label>
                    <select v-model="sortKey" style="width:100%">
                      <option value="absVariance">Largest absolute variance</option>
                      <option value="variance">Signed variance (desc)</option>
                      <option value="mfcTotal">MFC total (desc)</option>
                      <option value="drivenGross">Driven gross (desc)</option>
                      <option value="weekEnding">Week ending (newest first)</option>
                    </select>
                  </div>
                </div>
                <div v-if="loading" class="muted mono" style="margin-top: 12px">Running…</div>
                <div v-else-if="error" class="err">{{ error }}</div>
                <div v-else style="overflow-x:auto; margin-top: 12px">
                  <table>
                    <thead>
                      <tr>
                        <th>Week ending</th>
                        <th>Fleet #</th>
                        <th>Fleet</th>
                        <th>Store</th>
                        <th>Status</th>
                        <th class="num">MFC invoices</th>
                        <th class="num">MFC balance</th>
                        <th class="num">Driven gross</th>
                        <th class="num">Variance $</th>
                        <th class="num">Variance %</th>
                        <th class="num">Cars/day</th>
                      </tr>
                      <tr v-if="summary" class="totals">
                        <td colspan="5" class="mono">TOTAL across full match ({{ num(summary.total) }} rows)</td>
                        <td class="num">{{ num(summary.totalInvoiceCount) }}</td>
                        <td class="num">{{ money(summary.mfcTotal) }}</td>
                        <td class="num">{{ money(summary.drivenTotal) }}</td>
                        <td class="num">{{ money(summary.netVariance) }}</td>
                        <td class="num">—</td>
                        <td class="num">{{ num(summary.totalCarsPerDay) }}</td>
                      </tr>
                    </thead>
                    <tbody>
                      <tr v-for="(r, i) in rows" :key="i">
                        <td>{{ ymd(r.weekEnding) }}</td>
                        <td class="mono">{{ r.fleetAccountNumber ?? '—' }}</td>
                        <td>{{ r.fleetName }}</td>
                        <td class="mono">{{ r.storeNumber ?? '—' }}</td>
                        <td>
                          <span v-if="r.reconStatus === 'matched'" class="pill ok">matched</span>
                          <span v-else-if="r.reconStatus === 'variance'" class="pill warn">variance</span>
                          <span v-else-if="r.reconStatus === 'missing_mfc'" class="pill" style="background: #fde68a; color: #78350f">missing from MFC</span>
                          <span v-else class="pill" style="background: #fecaca; color: #7f1d1d">missing from Driven</span>
                        </td>
                        <td class="num">{{ r.invoiceCount == null ? '—' : num(r.invoiceCount) }}</td>
                        <td class="num">{{ r.mfcTotalBalance == null ? '—' : money(r.mfcTotalBalance) }}</td>
                        <td class="num">{{ r.drivenGrossSales == null ? '—' : money(r.drivenGrossSales) }}</td>
                        <td class="num">{{ r.variance == null ? '—' : money(r.variance) }}</td>
                        <td class="num">{{ r.variancePct == null ? '—' : (r.variancePct * 100).toFixed(1) + '%' }}</td>
                        <td class="num">{{ r.drivenCarsPerDay == null ? '—' : num(r.drivenCarsPerDay) }}</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
                <div v-if="summary && summary.total > rows.length" class="muted mono" style="margin-top: 8px">
                  Showing first {{ num(rows.length) }} of {{ num(summary.total) }}. Download CSV for the full set.
                </div>
              </div>
            </template>
          </template>
        </div>
      `
    };

    const Extracts = {
      props: ['db'],
      components: { FilterBar },
      setup(props) {
        const dbRef = computed(() => props.db);
        const facets = useFacets(dbRef);
        const preset = ref('invoices');
        const customSql = ref('SELECT * FROM v_invoice_enriched LIMIT 1000');
        const previewRows = ref([]);
        const previewCols = ref([]);
        const totalCount = ref(0);
        const loading = ref(false);
        const downloading = ref(false);
        const error = ref(null);

        const currentPreset = computed(() => PRESETS[preset.value]);

        const buildSql = () => {
          const p = currentPreset.value;
          if (p.custom) return customSql.value.trim().replace(/;\s*$/, '');
          const where = p.useFacets ? facets.buildWhere() : '';
          const orderBy = p.orderBy ? `ORDER BY ${p.orderBy}` : '';
          return `SELECT ${p.columnList} FROM ${p.table} ${where} ${orderBy}`;
        };

        const runPreview = async () => {
          if (!facets.hasData.value) return;
          loading.value = true;
          error.value = null;
          previewRows.value = []; previewCols.value = []; totalCount.value = 0;
          try {
            const sql = buildSql();
            if (!sql) return;
            const cnt = await runQuery(props.db, `SELECT COUNT(*) AS c FROM (${sql}) _t`);
            totalCount.value = Number(cnt[0].c);
            const preview = await runQuery(props.db, `SELECT * FROM (${sql}) _t LIMIT 20`);
            previewRows.value = preview;
            previewCols.value = preview.length ? Object.keys(preview[0]) : [];
          } catch (e) {
            error.value = e.message;
          } finally {
            loading.value = false;
          }
        };

        const download = async () => {
          if (!facets.hasData.value) return;
          downloading.value = true;
          error.value = null;
          try {
            const sql = buildSql();
            const rows = await runQuery(props.db, sql);
            downloadCsv(currentPreset.value.filename, toCsv(rows));
          } catch (e) {
            error.value = e.message;
          } finally {
            downloading.value = false;
          }
        };

        watch(() => facets.hasData.value, (v) => { if (v) runPreview(); }, { immediate: true });
        watch([preset, customSql, () => facets.startDate.value, () => facets.endDate.value, () => facets.fleetAccountNumber.value, () => facets.storeNumber.value, () => facets.voided.value, () => facets.search.value], runPreview);

        return { facets, preset, customSql, previewRows, previewCols, totalCount, loading, downloading, error, currentPreset, PRESETS, buildSql, runPreview, download, money, num, ymd };
      },
      template: `
        <div>
          <div v-if="!db || !facets.hasData.value" class="card">
            <div class="missing">Load the MFC extracts first.</div>
          </div>
          <template v-else>
            <div class="card">
              <h2>Extract builder</h2>
              <div class="q">Pick a dataset, optionally apply filters, preview the count, download as CSV.</div>

              <div class="grid-2" style="margin-bottom: 14px">
                <div>
                  <label>Dataset</label>
                  <select v-model="preset" style="width:100%">
                    <option v-for="(p, k) in PRESETS" :key="k" :value="k">{{ p.label }}</option>
                  </select>
                </div>
                <div>
                  <label>Output filename</label>
                  <input type="text" :value="currentPreset.filename" readonly style="width:100%; opacity:0.7" />
                </div>
              </div>

              <div v-if="currentPreset.custom" style="margin-bottom: 14px">
                <label>SQL</label>
                <textarea class="sql" v-model="customSql" spellcheck="false" style="min-height:120px"></textarea>
                <div class="muted mono" style="margin-top: 6px">Runs against the loaded DuckDB. Don't include a trailing <span class="mono">;</span>.</div>
              </div>
            </div>

            <FilterBar v-if="currentPreset.useFacets" :facets="facets" />
            <div v-else class="card">
              <div class="q">Filters don't apply to this dataset — it's a raw table dump.</div>
            </div>

            <div class="card">
              <div class="flex" style="margin-bottom: 12px">
                <button class="primary" @click="download" :disabled="downloading || loading || totalCount === 0">
                  {{ downloading ? 'Downloading…' : 'Download CSV (' + num(totalCount) + ' rows)' }}
                </button>
                <button class="ghost" @click="runPreview" :disabled="loading">{{ loading ? 'Running…' : 'Refresh preview' }}</button>
                <div class="spacer"></div>
                <div class="muted mono">Preview: first 20 rows</div>
              </div>

              <div v-if="error" class="err">{{ error }}</div>
              <div v-else-if="loading" class="muted mono">Running…</div>
              <div v-else-if="previewRows.length === 0" class="muted mono">No rows.</div>
              <div v-else style="overflow-x:auto; max-height: 500px">
                <table>
                  <thead><tr><th v-for="c in previewCols" :key="c">{{ c }}</th></tr></thead>
                  <tbody>
                    <tr v-for="(r, i) in previewRows" :key="i">
                      <td v-for="c in previewCols" :key="c">{{ r[c] }}</td>
                    </tr>
                  </tbody>
                </table>
              </div>

              <details style="margin-top: 14px">
                <summary style="cursor:pointer; color: var(--muted); font-size: 12px">SQL</summary>
                <pre style="background: #f3f4f6; border: 1px solid var(--border); padding: 10px; border-radius: 6px; font-size: 12px; overflow-x: auto; margin-top: 8px">{{ buildSql() }}</pre>
              </details>
            </div>
          </template>
        </div>
      `
    };

    const App = {
      components: { FileLoader, AllInvoices, ProductAnalytics, Reconciliation, Extracts },
      setup() {
        const db = shallowRef(null);
        const tab = ref('load');
        const tables = ref(new Set());
        const dbReady = ref(false);
        const viewsStatus = ref('');

        onMounted(async () => {
          try {
            const instance = await initDuckDB();
            instance.__tables = tables.value;
            db.value = instance;
            dbReady.value = true;
          } catch (e) {
            console.error(e);
            alert('DuckDB failed to initialize:\n' + e.message);
          }
        });

        const refreshTables = async () => {
          if (!db.value) return;
          try {
            // First pass — see what's loaded
            let rows = await runQuery(db.value, `SELECT table_name FROM information_schema.tables WHERE table_schema = 'main'`);
            let s = new Set(rows.map(r => r.table_name));

            const missingRequired = REQUIRED_TABLES.filter(t => !s.has(t));
            if (missingRequired.length === 0) {
              // All required tables present — (re)create the reconciliation views
              viewsStatus.value = 'creating views…';
              try {
                await createViews(db.value);
                viewsStatus.value = 'views ready';
              } catch (e) {
                viewsStatus.value = `view error: ${e.message}`;
                console.error(e);
              }
              // Refresh table list to include the views
              rows = await runQuery(db.value, `SELECT table_name FROM information_schema.tables WHERE table_schema = 'main'`);
              s = new Set(rows.map(r => r.table_name));
            } else {
              viewsStatus.value = `waiting for: ${missingRequired.join(', ')}`;
            }

            tables.value = s;
            db.value.__tables = s;
            if (s.has('v_invoice_enriched') && tab.value === 'load') tab.value = 'all';
          } catch (e) { console.error(e); }
        };

        const tabsMeta = [
          { key: 'load',     label: 'Load data' },
          { key: 'all',      label: 'All' },
          { key: 'products', label: 'Product analytics' },
          { key: 'recon',    label: 'Reconciliation' },
          { key: 'extracts', label: 'Extracts' },
        ];

        return { db, tab, tabsMeta, tables, dbReady, viewsStatus, refreshTables };
      },
      template: `
        <header class="app">
          <div class="flex">
            <h1>Driven Brands Analytics</h1>
            <span class="muted">DuckDB-WASM · local-only · no upload</span>
            <span v-if="viewsStatus" class="muted mono" style="margin-left: 12px">· {{ viewsStatus }}</span>
          </div>
          <nav class="tabs">
            <button v-for="t in tabsMeta" :key="t.key" :class="{ active: tab === t.key }" @click="tab = t.key">{{ t.label }}</button>
          </nav>
        </header>
        <main>
          <div v-if="!dbReady" class="card">
            <div class="muted mono">Initializing DuckDB-WASM…</div>
          </div>
          <template v-else>
            <div v-show="tab === 'load'"><FileLoader :db="db" @loaded="refreshTables" /></div>
            <div v-show="tab === 'all'"><AllInvoices :db="db" :key="Array.from(tables).join(',')" /></div>
            <div v-show="tab === 'products'"><ProductAnalytics :db="db" :key="Array.from(tables).join(',')" /></div>
            <div v-show="tab === 'recon'"><Reconciliation :db="db" :key="Array.from(tables).join(',')" /></div>
            <div v-show="tab === 'extracts'"><Extracts :db="db" :key="Array.from(tables).join(',')" /></div>
          </template>
        </main>
      `
    };

    createApp(App).mount('#app');
  })();
  </script>
</body>
</html>
